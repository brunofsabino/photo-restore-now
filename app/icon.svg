<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Blue rounded background -->
  <rect width="32" height="32" rx="7" fill="#2563eb"/>
  <!-- Photo frame -->
  <rect x="5" y="9" width="22" height="16" rx="2.5" fill="none" stroke="white" stroke-width="2"/>
  <!-- Camera bump -->
  <rect x="11" y="6.5" width="7" height="3.5" rx="1.5" fill="white"/>
  <!-- Lens ring -->
  <circle cx="16" cy="17" r="4.5" fill="none" stroke="white" stroke-width="2"/>
  <!-- Lens center dot -->
  <circle cx="16" cy="17" r="1.5" fill="white"/>
  <!-- Sparkle top-right -->
  <line x1="24" y1="10" x2="24" y2="13" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22.5" y1="11.5" x2="25.5" y2="11.5" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
</svg>
